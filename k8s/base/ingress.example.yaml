apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-sql-analyst
  namespace: ai-sql-analyst
spec:
  rules:
    - host: ai-sql-analyst.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-sql-analyst-api
                port:
                  number: 80
