apiVersion: v1
kind: Service
metadata:
  name: ai-sql-analyst-api
  namespace: ai-sql-analyst
spec:
  selector:
    app: ai-sql-analyst-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-sql-analyst-api
  namespace: ai-sql-analyst
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-sql-analyst-api
  template:
    metadata:
      labels:
        app: ai-sql-analyst-api
    spec:
      containers:
        - name: api
          image: ghcr.io/evanriley00/ai-sql-analyst:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ai-sql-analyst-config
            - secretRef:
                name: ai-sql-analyst-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
